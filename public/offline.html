<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f3d5e" />
    <title>Adestro - Sem conexao</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eaf4fb;
        --card: #ffffff;
        --text: #10263a;
        --muted: #47627a;
        --accent: #145a82;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "DM Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(33, 152, 129, 0.16), transparent 32%),
          radial-gradient(circle at top left, rgba(36, 140, 196, 0.2), transparent 35%),
          var(--bg);
        color: var(--text);
      }

      .card {
        width: min(480px, 100%);
        border-radius: 20px;
        background: var(--card);
        border: 1px solid rgba(20, 79, 116, 0.22);
        box-shadow: 0 24px 52px rgba(15, 61, 94, 0.13);
        padding: 20px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
      }

      button,
      a {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      button {
        background: var(--accent);
        color: #fff;
      }

      a {
        background: #d8e9f5;
        color: var(--text);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sem conexao com a internet</h1>
      <p>
        O Adestro continua instalado no seu celular, mas agora esta sem internet.
        Assim que a conexao voltar, atualize para continuar normalmente.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
        <a href="/dashboard">Ir para inicio</a>
      </div>
    </main>
  </body>
</html>
